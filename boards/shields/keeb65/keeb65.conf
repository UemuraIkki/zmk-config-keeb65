# Keeb65 shield configuration

# BLE有効（デフォルトで有効だが明示）
CONFIG_ZMK_BLE=y

# スリープ有効化（省電力）
CONFIG_ZMK_SLEEP=y
CONFIG_ZMK_IDLE_SLEEP_TIMEOUT=900000

# デバウンス（任意）
CONFIG_ZMK_KSCAN_DEBOUNCE_PRESS_MS=5
CONFIG_ZMK_KSCAN_DEBOUNCE_RELEASE_MS=5

# デバイス名
CONFIG_ZMK_KEYBOARD_NAME="Keeb65"

# 74HC595 シフトレジスタ（SPI経由GPIO）ドライバ有効化
CONFIG_SPI=y
CONFIG_GPIO=y
CONFIG_GPIO_595=y

# Caps Lock LED（保険。本来devicetree検出で自動有効化される）
CONFIG_LED=y
CONFIG_LED_GPIO=y
